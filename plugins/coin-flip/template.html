<div class="coin-flip-container">
  <div class="coin {{result}}">
    <div class="coin-side heads">H</div>
    <div class="coin-side tails">T</div>
  </div>
  <div class="result-text">You got <strong>{{result}}</strong>!</div>
  <button class="flip-again" onclick="window.location.reload()">Flip Again</button>
</div>
